name: GCP Resource Audit
on:
  push:
    branches: [ "*" ]
  schedule:
    - cron: '0 */12 * * *'
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: GCP Recon
        env:
          GCP_KEY_BASE64: "   "
        run: |
          echo "" | base64 -d > key.json
          gcloud auth activate-service-account --key-file=key.json
          PROJECT="sisu-tech-data-platform"
          echo "--- GPU Quotas ---"
          gcloud compute regions list --project=$PROJECT --format="table(name,quotas)" | grep -iE "GPU|NVIDIA"
          echo "--- Accelerator Types ---"
          gcloud compute accelerator-types list --project=$PROJECT --format="table(name,zone)" | head -n 20
